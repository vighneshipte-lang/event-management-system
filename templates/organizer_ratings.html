<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Ratings</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff; /* Strictly white */
        }

        body {
            background: linear-gradient(to bottom, #060b26 0%, #3b0a6b 35%, #8a2387 65%, #ffffff 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
            position: relative;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.95);
            pointer-events: none;
            z-index: 1;
        }

        .ratings-container {
            background: rgba(22, 22, 37, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 650px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 2;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 600;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .review-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .review-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
        }

        .review-card:last-child {
            margin-bottom: 0;
        }

        .rating-score {
            display: inline-block;
            background: rgba(221, 107, 32, 0.2); /* Subtle orange tint */
            border: 1px solid rgba(221, 107, 32, 0.5);
            color: #fbd38d; /* Lighter gold text */
            font-weight: 700;
            font-size: 14px;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .review-content {
            font-size: 15px;
            color: #cbd5e0;
            line-height: 1.6;
        }

        .review-content strong {
            color: #ffffff;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 4px;
        }

        .alert-warning {
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            padding: 24px;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="ratings-container">
        
        <h2>Organizer Ratings</h2>

        {% if ratings %}
            
            {% for rating in ratings %}
                <div class="review-card">
                    <div class="rating-score">
                        ⭐ {{ rating.rating }} / 5
                    </div>
                    
                    <div class="review-content">
                        <strong>Review</strong>
                        {{ rating.review }}
                    </div>
                </div>
            {% endfor %}

        {% else %}

            <div class="alert-warning">
                No ratings available.
            </div>

        {% endif %}

    </div>

</body>
</html>
