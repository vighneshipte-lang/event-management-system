<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Organizer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff; /* Strictly white */
        }

        body {
            background: linear-gradient(to bottom, #060b26 0%, #3b0a6b 35%, #8a2387 65%, #ffffff 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.95);
            pointer-events: none;
            z-index: 1;
        }

        .form-container {
            background: rgba(22, 22, 37, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 2;
        }

        h2 {
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .mb-3 { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff; /* Strictly white */
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #4a5568;
            border-radius: 8px;
            font-size: 15px;
            color: #ffffff; /* Strictly white */
            background-color: rgba(45, 55, 72, 0.7);
            transition: all 0.3s ease;
            color-scheme: dark;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-control:focus {
            outline: none;
            border-color: #b83280;
            box-shadow: 0 0 0 3px rgba(184, 50, 128, 0.25);
            background-color: rgba(45, 55, 72, 0.9);
        }

        select.form-control option {
            background-color: #1a202c;
            color: #ffffff;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            margin-top: 10px;
            color: #ffffff;
        }

        .btn-success {
            background: linear-gradient(135deg, #8a2387, #e94057);
            box-shadow: 0 4px 15px rgba(233, 64, 87, 0.3);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #9d2899, #f25066);
            box-shadow: 0 6px 20px rgba(233, 64, 87, 0.5);
        }

        .btn-success:active {
            transform: scale(0.98);
        }

        .btn.loading {
            background: #4a5568;
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
        }

        .error-message {
            color: #ffb3b3;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Rate Organizer</h2>

        <form method="POST" id="ratingForm">
            
            <div class="mb-3">
                <label for="rating">Rating</label>
                <select 
                    id="rating"
                    name="rating" 
                    class="form-control" 
                    required
                >
                    <option value="" disabled selected>Choose Rating</option>
                    <option value="1">⭐ 1 Star</option>
                    <option value="2">⭐⭐ 2 Stars</option>
                    <option value="3">⭐⭐⭐ 3 Stars</option>
                    <option value="4">⭐⭐⭐⭐ 4 Stars</option>
                    <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
                </select>
                <div class="error-message" id="ratingError">Please select a rating.</div>
            </div>

            <div class="mb-3">
                <label for="review">Review (Optional)</label>
                <textarea 
                    id="review"
                    name="review" 
                    class="form-control" 
                    placeholder="Tell us about your experience..."
                ></textarea>
            </div>

            <button type="submit" class="btn btn-success" id="submitBtn">
                Submit Rating
            </button>
            
        </form>
    </div>

    <script>
        document.getElementById('ratingForm').addEventListener('submit', function(e) {
            const ratingInput = document.getElementById('rating').value;
            const submitBtn = document.getElementById('submitBtn');
            let isValid = true;

            if (ratingInput === "") {
                document.getElementById('ratingError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('ratingError').style.display = 'none';
            }

            if (!isValid) {
                e.preventDefault();
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.innerHTML = 'Submitting...';
        });
    </script>

</body>
</html>
