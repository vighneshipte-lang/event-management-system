<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Notification</title>
    <style>
        /* CSS Reset & Basic Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Saturated Blue to Violet to Purple, fading to White at the bottom */
            background: linear-gradient(to bottom, #060b26 0%, #3b0a6b 35%, #8a2387 65%, #ffffff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Heavy Vignette Effect */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.95);
            pointer-events: none; /* Ensures the form remains clickable */
            z-index: 1;
        }

        /* Form Container (Dark Event Theme) */
        .form-container {
            background: rgba(22, 22, 37, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 2; /* Stays above the vignette */
        }

        h2 {
            color: #ffffff;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* Spacing for inputs */
        .mb-3 {
            margin-bottom: 20px;
        }

        /* Labels */
        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e0;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Input Fields & Textareas */
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #4a5568;
            border-radius: 8px;
            font-size: 15px;
            color: #ffffff;
            background-color: rgba(45, 55, 72, 0.7);
            transition: all 0.3s ease;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .form-control::placeholder {
            color: #718096;
        }

        .form-control:focus {
            outline: none;
            border-color: #b83280; /* Magenta/Purple accent */
            box-shadow: 0 0 0 3px rgba(184, 50, 128, 0.25);
            background-color: rgba(45, 55, 72, 0.9);
        }

        /* Button Styling */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .btn-success {
            background: linear-gradient(135deg, #8a2387, #e94057);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 64, 87, 0.3);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #9d2899, #f25066);
            box-shadow: 0 6px 20px rgba(233, 64, 87, 0.5);
        }

        .btn-success:active {
            transform: scale(0.98);
        }

        /* Button Loading State */
        .btn.loading {
            background: #4a5568;
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Error Message Validation */
        .error-message {
            color: #fc8181;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Create Notification</h2>

        <form method="POST" id="notificationForm">
            
            <div class="mb-3">
                <label for="title">Title</label>
                <input 
                    type="text" 
                    id="title"
                    name="title" 
                    class="form-control" 
                    placeholder="e.g., System Update"
                    required
                >
                <div class="error-message" id="titleError">Title cannot be blank.</div>
            </div>

            <div class="mb-3">
                <label for="message">Message</label>
                <textarea 
                    id="message"
                    name="message" 
                    class="form-control" 
                    placeholder="Type your notification message here..."
                    required
                ></textarea>
                <div class="error-message" id="messageError">Message cannot be blank.</div>
            </div>

            <button type="submit" class="btn btn-success" id="submitBtn">
                Send Notification
            </button>
            
        </form>
    </div>

    <script>
        document.getElementById('notificationForm').addEventListener('submit', function(e) {
            // Grab inputs
            const titleInput = document.getElementById('title').value.trim();
            const messageInput = document.getElementById('message').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            let isValid = true;

            // Validation: Prevent purely whitespace submissions
            if (titleInput === "") {
                document.getElementById('titleError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('titleError').style.display = 'none';
            }

            if (messageInput === "") {
                document.getElementById('messageError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('messageError').style.display = 'none';
            }

            // Prevent submission if validation fails
            if (!isValid) {
                e.preventDefault();
                return;
            }

            // Simulate UI Loading State
            submitBtn.classList.add('loading');
            submitBtn.innerHTML = 'Sending...';
        });
    </script>

</body>
</html>
