<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff; /* Strictly white */
        }

        body {
            background: linear-gradient(to bottom, #060b26 0%, #3b0a6b 35%, #8a2387 65%, #ffffff 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.95);
            pointer-events: none;
            z-index: 1;
        }

        .landing-container {
            background: rgba(22, 22, 37, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 2;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 16px;
            font-size: 32px;
            font-weight: 700;
        }

        p.subtitle {
            color: #cbd5e0;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 300px;
            margin: 0 auto;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: filter 0.2s ease, transform 0.1s ease;
            color: #ffffff;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3182ce, #2b6cb0);
            box-shadow: 0 4px 15px rgba(49, 130, 206, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (min-width: 480px) {
            .button-group {
                flex-direction: row;
                max-width: 400px;
            }
            .btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <div class="landing-container">
        
        <h1>Welcome to Event Management System</h1>
        
        <p class="subtitle">
            Organize, manage, and track your events, schedules, and performers all in one place.
        </p>

        <div class="button-group">
            <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Login</a>
            <a href="{{ url_for('auth.register') }}" class="btn btn-secondary">Register</a>
        </div>

    </div>

</body>
</html>
