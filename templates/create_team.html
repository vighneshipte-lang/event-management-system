{% extends 'base.html' %}

{% block content %}

<h2>Create Team</h2>

<form method="POST">

    <div class="mb-3">

        <label>Team Name</label>

        <input
            type="text"
            name="team_name"
            class="form-control"
            required
        >

    </div>

    <button
        type="submit"
        class="btn btn-success"
    >
        Create Team
    </button>

</form>

{% endblock %}
