<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Event Management System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff; /* Strictly white */
        }

        body {
            background: linear-gradient(to bottom, #060b26 0%, #3b0a6b 35%, #8a2387 65%, #ffffff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            background-attachment: fixed;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.95);
            pointer-events: none;
            z-index: 1;
        }

        .form-container {
            background: rgba(22, 22, 37, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 2;
        }

        h2 {
            margin-bottom: 24px;
            font-size: 26px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* Glassmorphism Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }
        .alert-success { background: rgba(47, 133, 90, 0.3); border: 1px solid rgba(104, 211, 145, 0.5); }
        .alert-danger, .alert-error { background: rgba(197, 48, 48, 0.3); border: 1px solid rgba(252, 129, 129, 0.5); }
        .alert-warning { background: rgba(180, 83, 9, 0.3); border: 1px solid rgba(246, 224, 94, 0.5); }
        .alert-info { background: rgba(43, 108, 176, 0.3); border: 1px solid rgba(144, 205, 244, 0.5); }

        .mb-3 { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff; /* Strictly white */
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #4a5568;
            border-radius: 8px;
            font-size: 15px;
            color: #ffffff; /* Strictly white input text */
            background-color: rgba(45, 55, 72, 0.7);
            transition: all 0.3s ease;
            color-scheme: dark;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-control:focus {
            outline: none;
            border-color: #b83280;
            box-shadow: 0 0 0 3px rgba(184, 50, 128, 0.25);
            background-color: rgba(45, 55, 72, 0.9);
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .toggle-btn:hover { opacity: 1; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            margin-top: 10px;
            color: #ffffff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3182ce, #2b6cb0);
            box-shadow: 0 4px 15px rgba(49, 130, 206, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4299e1, #3182ce);
            box-shadow: 0 6px 20px rgba(49, 130, 206, 0.5);
        }

        .btn-primary:active { transform: scale(0.98); }

        .btn.loading {
            background: #4a5568;
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
        }

        .error-message {
            color: #ffb3b3;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>User Registration</h2>

        {% with messages = get_flashed_messages(with_categories=true) %} 
            {% if messages %} 
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %} 
            {% endif %} 
        {% endwith %}

        <form method="POST" id="registerForm">
            
            <div class="mb-3">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="form-control" placeholder="John Doe" required />
            </div>

            <div class="mb-3">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="johndoe@example.com" required />
            </div>

            <div class="mb-3">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input 
                        type="password" 
                        name="password" 
                        id="password" 
                        class="form-control" 
                        placeholder="Create a strong password"
                        required 
                    />
                    <button type="button" class="toggle-btn" onclick="togglePassword()">
                        <img id="eyeIcon" src="{{ url_for('static', filename='images/eye-open.png') }}" width="20" height="20" alt="Toggle" />
                    </button>
                </div>
                <div class="error-message" id="passwordError">Password must be at least 6 characters long.</div>
            </div>

            <div class="mb-3">
                <label for="role">Select Role</label>
                <select id="role" name="role" class="form-control" required>
                    <option value="" disabled selected>Choose Role</option>
                    <option value="user">User</option>
                    <option value="organizer">Organizer</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">Register</button>
        </form>
    </div>

    <script>
        function togglePassword() {
            let passwordField = document.getElementById("password");
            let eyeIcon = document.getElementById("eyeIcon");
            if (passwordField.type === "password") {
                passwordField.type = "text";
                eyeIcon.src = "{{ url_for('static', filename='images/eye-closed.png') }}";
            } else {
                passwordField.type = "password";
                eyeIcon.src = "{{ url_for('static', filename='images/eye-open.png') }}";
            }
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const passwordInput = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            if (passwordInput.length < 6) {
                document.getElementById('passwordError').style.display = 'block';
                e.preventDefault();
                return;
            }
            submitBtn.classList.add('loading');
            submitBtn.innerHTML = 'Registering...';
        });
    </script>
</body>
</html>
