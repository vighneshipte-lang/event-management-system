<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Event</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #060b26 0%, #3b0a6b 35%, #8a2387 65%, #ffffff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            background-attachment: fixed;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.95);
            pointer-events: none;
            z-index: 1;
        }

        .form-container {
            background: rgba(22, 22, 37, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 550px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 2;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .mb-3 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e0;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #4a5568;
            border-radius: 8px;
            font-size: 15px;
            color: #ffffff;
            background-color: rgba(45, 55, 72, 0.7);
            transition: all 0.3s ease;
            color-scheme: dark;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .form-control:focus {
            outline: none;
            border-color: #b83280;
            box-shadow: 0 0 0 3px rgba(184, 50, 128, 0.25);
            background-color: rgba(45, 55, 72, 0.9);
        }

        select.form-control option {
            background-color: #1a202c;
            color: #ffffff;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .btn-success {
            background: linear-gradient(135deg, #8a2387, #e94057);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 64, 87, 0.3);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #9d2899, #f25066);
            box-shadow: 0 6px 20px rgba(233, 64, 87, 0.5);
        }

        .btn-success:active {
            transform: scale(0.98);
        }

        .btn.loading {
            background: #4a5568;
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
        }

        .error-message {
            color: #fc8181;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Edit Event</h2>

        <form method="POST" id="editEventForm">
            
            <div class="mb-3">
                <label for="title">Title</label>
                <input 
                    type="text" 
                    id="title"
                    name="title" 
                    class="form-control" 
                    value="{{ event.title }}"
                    required 
                />
            </div>

            <div class="mb-3">
                <label for="description">Description</label>
                <textarea 
                    id="description"
                    name="description" 
                    class="form-control" 
                    required
                >{{ event.description }}</textarea>
            </div>

            <div class="mb-3">
                <label for="venue">Venue</label>
                <input 
                    type="text" 
                    id="venue"
                    name="venue" 
                    class="form-control" 
                    value="{{ event.venue }}"
                    required 
                />
            </div>

            <div class="mb-3">
                <label for="event_type">Event Type</label>
                <select id="event_type" name="event_type" class="form-control">
                    <option value="social" {% if event.event_type == 'social' %} selected {% endif %}>
                        Social
                    </option>
                    <option value="fixed" {% if event.event_type == 'fixed' %} selected {% endif %}>
                        Fixed
                    </option>
                </select>
            </div>

            <div class="form-row">
                <div class="mb-3">
                    <label for="start_date">Start Date</label>
                    <input 
                        type="date" 
                        id="start_date"
                        name="start_date" 
                        class="form-control" 
                        value="{{ event.start_date }}"
                        required 
                    />
                </div>

                <div class="mb-3">
                    <label for="end_date">End Date</label>
                    <input 
                        type="date" 
                        id="end_date"
                        name="end_date" 
                        class="form-control" 
                        value="{{ event.end_date }}"
                        required 
                    />
                </div>
            </div>
            <div class="error-message" id="dateError" style="margin-top: -15px; margin-bottom: 15px;">End Date cannot be before Start Date.</div>

            <button type="submit" class="btn btn-success" id="submitBtn">Update Event</button>
        </form>
    </div>

    <script>
        document.getElementById('editEventForm').addEventListener('submit', function(e) {
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;
            const submitBtn = document.getElementById('submitBtn');
            let isValid = true;

            // Date validation: End date must be >= Start date
            if (startDate && endDate && endDate < startDate) {
                document.getElementById('dateError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('dateError').style.display = 'none';
            }

            if (!isValid) {
                e.preventDefault();
                return;
            }

            // Apply loading state
            submitBtn.classList.add('loading');
            submitBtn.innerHTML = 'Updating...';
        });
    </script>
</body>
</html>
