<!doctype html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Expense</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body {
            background: linear-gradient(to bottom, #060b26 0%, #3b0a6b 35%, #8a2387 65%, #ffffff 100%);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .expense-container {

            max-width: 700px;
            margin: auto;

            background: rgba(22, 22, 37, 0.85);

            padding: 30px;

            border-radius: 15px;

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255,255,255,0.1);

            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .form-control,
        .form-select,
        textarea {

            background: rgba(255,255,255,0.08) !important;

            border: 1px solid rgba(255,255,255,0.1) !important;

            color: white !important;
        }

        .form-control::placeholder,
        textarea::placeholder {

            color: #cccccc;
        }

        .btn-primary {

            background: linear-gradient(135deg, #3182ce, #2b6cb0);

            border: none;
        }

        .btn-secondary {

            background: rgba(255,255,255,0.15);

            border: none;
        }

    </style>

</head>

<body>

<div class="expense-container">

    <h2 class="mb-4">
        Add Expense
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Expense Title
            </label>

            <input
                type="text"
                name="title"
                class="form-control"
                required
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Amount
            </label>

            <input
                type="number"
                step="0.01"
                name="amount"
                class="form-control"
                required
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Category
            </label>

            <input
                type="text"
                name="category"
                class="form-control"
                placeholder="Food / Stage / Sound"
                required
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Description
            </label>

            <textarea
                name="description"
                rows="4"
                class="form-control"
            ></textarea>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Expense Date
            </label>

            <input
                type="date"
                name="spent_on"
                class="form-control"
                required
            >

        </div>

        <button
            type="submit"
            class="btn btn-primary"
        >
            Save Expense
        </button>

        <a
            href="{{ url_for('organizer.organizer_dashboard') }}"
            class="btn btn-secondary"
        >
            Back
        </a>

    </form>

</div>

</body>
</html>
