<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Event Category</title>
    <style>
        /* CSS Reset & Basic Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Saturated Blue to Violet to Purple, fading to White at the bottom */
            background: linear-gradient(to bottom, #060b26 0%, #3b0a6b 35%, #8a2387 65%, #ffffff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Heavy Vignette Effect */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.95);
            pointer-events: none; /* Ensures the form remains clickable */
            z-index: 1;
        }

        /* Form Container (Dark Event Theme) */
        .form-container {
            background: rgba(22, 22, 37, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 2; /* Stays above the vignette */
        }

        h2 {
            color: #ffffff;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* Spacing for inputs */
        .mb-3 {
            margin-bottom: 20px;
        }

        /* Labels */
        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e0;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Input Fields */
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #4a5568;
            border-radius: 8px;
            font-size: 15px;
            color: #ffffff;
            background-color: rgba(45, 55, 72, 0.7);
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: #718096;
        }

        .form-control:focus {
            outline: none;
            border-color: #b83280; /* Magenta/Purple accent */
            box-shadow: 0 0 0 3px rgba(184, 50, 128, 0.25);
            background-color: rgba(45, 55, 72, 0.9);
        }

        /* Target the select dropdown options so they are readable */
        select.form-control option {
            background-color: #1a202c;
            color: #ffffff;
        }

        /* Button Styling */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .btn-success {
            /* Upgraded to match the purple event theme rather than standard green */
            background: linear-gradient(135deg, #8a2387, #e94057);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 64, 87, 0.3);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #9d2899, #f25066);
            box-shadow: 0 6px 20px rgba(233, 64, 87, 0.5);
        }

        .btn-success:active {
            transform: scale(0.98);
        }

        /* Button Loading State */
        .btn.loading {
            background: #4a5568;
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Error Message Validation */
        .error-message {
            color: #fc8181;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Add Event Category</h2>

        <form method="POST" id="categoryForm">
            <div class="mb-3">
                <label for="category_name">Category Name</label>
                <input 
                    type="text" 
                    id="category_name"
                    name="category_name" 
                    class="form-control" 
                    placeholder="e.g., Hackathon"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="registration_type">Registration Type</label>
                <select 
                    id="registration_type"
                    name="registration_type" 
                    class="form-control"
                >
                    <option value="solo">Solo</option>
                    <option value="team">Team</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="prize_amount">Prize Amount ($)</label>
                <input 
                    type="number" 
                    id="prize_amount"
                    name="prize_amount" 
                    class="form-control" 
                    placeholder="0"
                    min="0"
                    required
                >
                <div class="error-message" id="prizeError">Prize amount cannot be negative.</div>
            </div>

            <div class="mb-3">
                <label for="max_participants">Maximum Participants</label>
                <input 
                    type="number" 
                    id="max_participants"
                    name="max_participants" 
                    class="form-control" 
                    placeholder="e.g., 50"
                    min="1"
                    required
                >
                <div class="error-message" id="participantError">Must have at least 1 participant.</div>
            </div>

            <button type="submit" class="btn btn-success" id="submitBtn">
                Add Category
            </button>
        </form>
    </div>

    <script>
        document.getElementById('categoryForm').addEventListener('submit', function(e) {
            // Grab inputs
            const prizeInput = document.getElementById('prize_amount').value;
            const participantsInput = document.getElementById('max_participants').value;
            const submitBtn = document.getElementById('submitBtn');
            let isValid = true;

            // Basic Validation logic
            if (prizeInput < 0) {
                document.getElementById('prizeError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('prizeError').style.display = 'none';
            }

            if (participantsInput < 1) {
                document.getElementById('participantError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('participantError').style.display = 'none';
            }

            // Prevent submission if validation fails
            if (!isValid) {
                e.preventDefault();
                return;
            }

            // Simulate UI Loading State
            submitBtn.classList.add('loading');
            submitBtn.innerHTML = 'Processing...';
        });
    </script>

</body>
</html>
