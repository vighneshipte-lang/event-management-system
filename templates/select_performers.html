<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Performers</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff; /* Strictly white */
        }

        body {
            background: linear-gradient(to bottom, #060b26 0%, #3b0a6b 35%, #8a2387 65%, #ffffff 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
            position: relative;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.95);
            pointer-events: none;
            z-index: 1;
        }

        .table-container {
            background: rgba(22, 22, 37, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 900px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 2;
        }

        .header-group {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        h4 {
            color: #cbd5e0;
            font-size: 15px;
            font-weight: 500;
        }

        .event-badge {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            margin-left: 4px;
        }

        .table-responsive {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 15px;
            vertical-align: middle;
        }

        th {
            background-color: rgba(45, 55, 72, 0.5);
            color: #ffffff;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr {
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: filter 0.2s ease, transform 0.1s ease;
            color: #ffffff;
        }

        .btn:active { transform: scale(0.98); }
        .btn:hover { filter: brightness(1.1); }

        .btn-primary {
            background: linear-gradient(135deg, #3182ce, #2b6cb0);
        }

        .alert-empty {
            background-color: rgba(255, 255, 255, 0.05);
            color: #a0aec0;
            padding: 20px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="table-container">

        <div class="header-group">
            <h2>Select Performers</h2>
            <h4>Event: <span class="event-badge">{{ event.title }}</span></h4>
        </div>

        {% if users %}
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                        <tr>
                            <td>{{ user.id }}</td>
                            
                            <td><strong>{{ user.full_name }}</strong></td>
                            
                            <td>{{ user.email }}</td>
                            
                            <td>
                                <a 
                                    href="{{ url_for('organizer.add_performer', event_id=event.id, user_id=user.id) }}" 
                                    class="btn btn-primary"
                                >
                                    Select Performer
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        {% else %}
            <div class="alert-empty">
                No users available to select.
            </div>
        {% endif %}

    </div>

</body>
</html>
