<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Performers</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body>

<div class="container mt-5">

    <h2>Select Performers</h2>

    <h4>
        Event:
        {{ event.title }}
    </h4>

    <table class="table table-bordered">

        <thead>

            <tr>

                <th>User ID</th>

                <th>Name</th>

                <th>Email</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody>

            {% for user in users %}

            <tr>

                <td>{{ user.id }}</td>

                <td>{{ user.full_name }}</td>

                <td>{{ user.email }}</td>

                <td>

                    <a
                        href="{{ url_for('organizer.add_performer', event_id=event.id, user_id=user.id) }}"
                        class="btn btn-primary btn-sm"
                    >
                        Select Performer
                    </a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
