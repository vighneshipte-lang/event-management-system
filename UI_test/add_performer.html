<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Performer</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body>

<div class="container mt-5">

    <h2>Add Performer</h2>

    <form method="POST">

        <div class="mb-3">

            <label>Performer Name</label>

            <input
                type="text"
                name="performer_name"
                class="form-control"
                required
            >

        </div>

        <div class="mb-3">

            <label>Performance Title</label>

            <input
                type="text"
                name="performance_title"
                class="form-control"
                required
            >

        </div>

        <div class="mb-3">

            <label>Performance Time</label>

            <input
                type="text"
                name="performance_time"
                class="form-control"
                placeholder="Example: 7:00 PM"
            >

        </div>

        <div class="mb-3">

            <label>Description</label>

            <textarea
                name="description"
                class="form-control"
            ></textarea>

        </div>

        <button
            type="submit"
            class="btn btn-success"
        >
            Add Performer
        </button>

    </form>

</div>

</body>
</html>
