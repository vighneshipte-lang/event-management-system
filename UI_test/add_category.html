
<h2>Add Event Category</h2>

<form method="POST">

    <div class="mb-3">

        <label>Category Name</label>

        <input
            type="text"
            name="category_name"
            class="form-control"
            required
        >

    </div>

    <div class="mb-3">

        <label>Registration Type</label>

        <select
            name="registration_type"
            class="form-control"
        >

            <option value="solo">
                Solo
            </option>

            <option value="team">
                Team
            </option>

        </select>

    </div>

    <div class="mb-3">

        <label>Prize Amount</label>

        <input
            type="number"
            name="prize_amount"
            class="form-control"
            required
        >

    </div>

    <div class="mb-3">

        <label>Maximum Participants</label>

        <input
            type="number"
            name="max_participants"
            class="form-control"
            required
        >

    </div>

    <button
        type="submit"
        class="btn btn-success"
    >
        Add Category
    </button>

</form>
