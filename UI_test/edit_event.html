<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Event</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h2>Edit Event</h2>

      <form method="POST">
        <div class="mb-3">
          <label>Title</label>

          <input
            type="text"
            name="title"
            class="form-control"
            value="{{ event.title }}"
            required
          />
        </div>

        <div class="mb-3">
          <label>Description</label>

          <textarea name="description" class="form-control" required>
{{ event.description }}</textarea
          >
        </div>

        <div class="mb-3">
          <label>Venue</label>

          <input
            type="text"
            name="venue"
            class="form-control"
            value="{{ event.venue }}"
            required
          />
        </div>

        <div class="mb-3">
          <label>Event Type</label>

          <select name="event_type" class="form-control">
            <option
              value="social"
              {%
              if
              event.event_type=""
              ="social"
              %}
              selected
              {%
              endif
              %}
            >
              Social
            </option>

            <option
              value="fixed"
              {%
              if
              event.event_type=""
              ="fixed"
              %}
              selected
              {%
              endif
              %}
            >
              Fixed
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label>Start Date</label>

          <input
            type="date"
            name="start_date"
            class="form-control"
            value="{{ event.start_date }}"
            required
          />
        </div>

        <div class="mb-3">
          <label>End Date</label>

          <input
            type="date"
            name="end_date"
            class="form-control"
            value="{{ event.end_date }}"
            required
          />
        </div>

        <button type="submit" class="btn btn-success">Update Event</button>
      </form>
    </div>
  </body>
</html>
