<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Performance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Assign Performance Time</h2>

    <form method="POST">

        <div class="mb-3">

            <label>Performance Time</label>

            <input
                type="text"
                name="performance_time"
                class="form-control"
                placeholder="Example: 5:30 PM"
                required
            >

        </div>

        <button type="submit" class="btn btn-success">
            Assign Time
        </button>

    </form>

</div>

</body>
</html>
