<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Organizer</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body>

<div class="container mt-5">

    <h2>Report Organizer</h2>

    <form method="POST">

        <div class="mb-3">

            <label>Complaint</label>

            <textarea
                name="complaint_text"
                class="form-control"
                required
            ></textarea>

        </div>

        <button type="submit" class="btn btn-danger">
            Submit Complaint
        </button>

    </form>

</div>

</body>
</html>
