<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body>

<div class="container mt-5">

    <h2>My Profile</h2>

    <form method="POST">

        <div class="mb-3">

            <label>Full Name</label>

            <input
                type="text"
                name="full_name"
                class="form-control"
                value="{{ current_user.full_name }}"
                required
            >

        </div>

        <div class="mb-3">

            <label>Email</label>

            <input
                type="email"
                name="email"
                class="form-control"
                value="{{ current_user.email }}"
                required
            >

        </div>

        <div class="mb-3">

            <label>New Password</label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Leave blank to keep current password"
            >

        </div>

        <button
            type="submit"
            class="btn btn-success"
        >
            Update Profile
        </button>

    </form>

</div>

</body>
</html>
